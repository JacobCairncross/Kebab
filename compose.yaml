services:
  miner:
    image: kebab
    ports:
      - "6002:6002"
  db:
    image: postgres
    restart: always
    ports:
      - 5432:5432
    environment:
      - POSTGRES_PASSWORD=S3cret
      - POSTGRES_USER=user
      - POSTGRES_DB=kebab_miner
    volumes:
      - pgdata:/var/lib/postgresql/data 
volumes:
  pgdata: